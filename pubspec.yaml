name: sales_quote_arnexa
description: Sales Quote Management App for Arena & Nexa Dealerships
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0
  fl_chart: ^0.66.2
  intl: ^0.19.0
  pdf: ^3.10.8
  printing: ^5.11.1
  share_plus: ^7.2.2
  url_launcher: ^6.2.4
  sqflite: ^2.3.2
  path: ^1.9.0
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9
  lottie: ^3.0.0
  shimmer: ^3.0.0
  curved_navigation_bar: ^1.0.3
  flutter_staggered_animations: ^1.1.1
  percent_indicator: ^4.2.3
  dropdown_search: ^5.0.6
  http: ^1.6.0
  shared_preferences: ^2.2.2
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
   - assets/images/logo.png
   - assets/images/logo.png
   - assets/images/Arenabottom.png
