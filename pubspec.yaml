name: pmpl_salesquote 

description: Sales Quote Management App for Arena & Nexa Dealerships

publish_to: 'none'

version: 1.0.0+24

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:

  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0
  fl_chart: ^0.66.2
  intl: ^0.19.0
  pdf: ^3.10.8
  printing: ^5.11.1
  share_plus: ^7.2.2
  url_launcher: ^6.2.4
  sqflite: ^2.3.2
  path: ^1.9.0
  path_provider: ^2.1.2
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9
  lottie: ^3.0.0
  shimmer: ^3.0.0
  curved_navigation_bar: ^1.0.3
  flutter_staggered_animations: ^1.1.1
  percent_indicator: ^4.2.3
  dropdown_search: ^5.0.6
  http: ^1.6.0
  shared_preferences: ^2.2.2


dev_dependencies:

  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.1
  flutter_native_splash: ^2.4.0
  flutter_launcher_icons: ^0.13.1


flutter:

  uses-material-design: true

  assets:
    - assets/images/logo.png
    - assets/images/marutinexa.jpeg
    - assets/images/Arenabottom.png
    - assets/images/newnexalogo.png


flutter_native_splash:

  color: "#ffffff"

  image: assets/images/logo.png

  android: true
  ios: true

  android_12:
    image: assets/images/logo.png
    color: "#ffffff"


flutter_launcher_icons:

  android: true
  ios: true

  image_path: "assets/images/logo.png"

  min_sdk_android: 21