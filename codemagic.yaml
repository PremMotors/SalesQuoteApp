workflows:
  ios-release:
    name: iOS Release

    integrations:
      app_store_connect: PMSalesQuote
      
    environment:
      flutter: stable
      xcode: latest

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Build iOS IPA
        # Changed: Removed --no-codesign so it creates the final signed package
        script: flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        # Added: This forces Codemagic to auto-sign the build during the compile step
        code_signing:
          distribution_type: app_store
