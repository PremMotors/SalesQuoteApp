workflows:
  ios-release:
    name: iOS Release

    integrations:
      app_store_connect: PMSalesQuote
      
    environment:
      flutter: stable
      xcode: latest
      # 1. MOVED HERE: This is where code signing must be declared
      ios_signing:
        distribution_type: app_store

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Build iOS IPA
        script: flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        # 2. FIXED: Removed the extra code_signing fields from here
        auth: integration
