workflows:
  ios-release:
    name: iOS Release

    integrations:
      app_store_connect: PMSalesQuote
      
    environment:
      flutter: stable
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.premmotors.salesquote

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      # Fix for Windows Users: Overriding the hidden internal Bundle ID variable
      - name: Force Code Signing Configuration
        script: |
          sed -i '' 's/ProvisioningStyle = Automatic;/ProvisioningStyle = Manual;/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' ios/Runner.xcodeproj/project.pbxproj
          find ios/Runner.xcodeproj/project.pbxproj -type f -exec sed -i '' 's/PRODUCT_BUNDLE_IDENTIFIER = .*/PRODUCT_BUNDLE_IDENTIFIER = com.premmotors.salesquote;/g' {} +

      - name: Build iOS IPA
        script: flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
