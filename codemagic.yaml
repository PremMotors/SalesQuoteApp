workflows:
  ios-release:
    name: iOS Release

    # Fixed: Indented with 4 spaces to align under ios-release
    integrations:
      app_store_connect: PMSalesQuote
      
    environment:
      flutter: stable
      xcode: latest

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Build iOS IPA
        script: flutter build ipa --release --no-codesign

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
