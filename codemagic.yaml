workflows:
  ios-release:
    name: iOS Release

    integrations:
      app_store_connect: PMSalesQuote
      
    environment:
      flutter: stable
      xcode: latest
      ios_signing:
        distribution_type: app_store
        # Fixed: Added the required bundle identifier field here
        bundle_identifier: com.premmotors.salesquote

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Build iOS IPA
        script: flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
